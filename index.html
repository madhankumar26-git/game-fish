<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Proverb Quest - Grand Finale Edition</title>
    <style>
        :root {
            --gold: #FFCA28;
            --orange: #FF5722;
            --blue: #00B0FF;
            --green: #4CAF50;
            --red: #F44336;
        }

        html, body { 
            height: 100%;
            margin: 0; padding: 0; 
            overflow: hidden; 
            font-family: 'Arial Rounded MT Bold', sans-serif; 
            touch-action: none; 
            background: #222; 
            display: flex; justify-content: center; align-items: center;
        }
        
        #game-canvas {
            width: 100vw; 
            height: 100dvh; 
            background-image: url('im.png'); background-size: cover; 
            background-repeat: no-repeat; background-position: center;
            position: relative; overflow: hidden;
        }

        @media (min-width: 1024px) {
            #game-canvas { width: 90vw; height: 85vh; border: 8px solid var(--gold); border-radius: 20px; }
        }

        .full-screen-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); 
            display: none;
            flex-direction: column; 
            justify-content: center; 
            align-items: center;     
            z-index: 500; color: white; text-align: center; padding: 20px;
            box-sizing: border-box;
        }

        .top-controls {
            position: absolute; 
            top: env(safe-area-inset-top, 15px); 
            left: 15px;
            display: flex; flex-direction: row; gap: 8px; z-index: 200;
        }

        .action-btn {
            width: 50px; height: 50px; 
            border: 2px solid rgba(255, 255, 255, 0.6); 
            border-radius: 50%;
            font-weight: 900; font-size: 8px;
            color: white; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(5px); transition: 0.3s;
            text-align: center; line-height: 1.1;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        #hint-btn { background: rgba(183, 149, 11, 0.8); }
        #super-hint-btn { background: rgba(0, 176, 255, 0.8); border-color: var(--blue); }
        #select-menu-btn { background: rgba(76, 175, 80, 0.8); border-color: var(--green); }

        #level-badge {
            position: absolute; 
            top: env(safe-area-inset-top, 15px); 
            right: 15px;
            background: var(--orange); color: white;
            padding: 8px 18px; border-radius: 30px;
            font-size: 0.8rem; font-weight: 900; z-index: 200;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        #player {
            position: absolute; 
            top: 15%; 
            left: 5%;
            width: 25%; max-width: 200px; min-width: 120px;
            z-index: 50; transition: left 0.7s ease-out;
        }
        #player img { width: 100%; pointer-events: none; }

        #rod-line {
            position: absolute; 
            top: 10%; left: 77%; 
            width: 2px; height: 0; background: #eeeeee; 
            transition: height 0.5s ease-in; z-index: 40;
        }

        /* --- FINAL ALIGNMENT FIX --- */
        .fish-bubble {
            position: absolute; 
            width: auto; 
            min-width: 110px; 
            height: 75px;
            
            background-image: url('fishh.png'); 
            background-size: 100% 100%; 
            background-repeat: no-repeat; 
            background-position: center;
            
            display: flex; 
            align-items: center; 
            justify-content: center;
            
            /* ADJUSTED: 20px bottom padding pushes text DOWN into the center of the two lines */
            padding: 5px 25px 0px 45px; 
            box-sizing: border-box;
            line-height: 1; 
            
            font-size: 13px; 
            font-weight: 900; 
            color: #000;
            text-transform: uppercase;
            white-space: nowrap; 
            
            cursor: pointer; 
            z-index: 20; 
            user-select: none;
            text-align: center;
        }
        
        .fish-bubble * { pointer-events: none; }

        #word-bar-container {
            position: absolute; 
            bottom: env(safe-area-inset-bottom, 25px); 
            left: 50%; transform: translateX(-60%);
            background: rgba(255, 255, 255, 0.9); border: 4px solid var(--gold); 
            padding: 10px 18px; border-radius: 40px; width: 85%; max-width: 600px;
            z-index: 300; pointer-events: none; 
        }

        #word-display { font-size: 1rem; color: #333; text-align: center; font-weight: 900; }

        @keyframes shake-red {
            0% { transform: translateX(0); }
            25% { transform: translateX(-8px); filter: sepia(1) saturate(5); }
            50% { transform: translateX(8px); }
            100% { transform: translateX(0); }
        }
        .wrong-fish { animation: shake-red 0.4s ease-in-out; z-index: 150; }

        @keyframes pulse-glow {
            0% { filter: drop-shadow(0 0 5px #FFD700); transform: scale(1); }
            50% { filter: drop-shadow(0 0 20px #FFD700); transform: scale(1.05); }
            100% { filter: drop-shadow(0 0 5px #FFD700); transform: scale(1); }
        }
        .hint-glow { animation: pulse-glow 0.8s infinite; z-index: 100 !important; }

        .level-btn {
            background: rgba(255, 255, 255, 0.15); color: white; border: 2px solid var(--gold);
            padding: 12px; border-radius: 12px; font-size: 0.9rem; font-weight: bold;
            cursor: pointer; transition: 0.2s; backdrop-filter: blur(10px);
        }

        #congrats-overlay {
            position: fixed !important; 
            z-index: 100000 !important; 
            background: rgba(0, 0, 0, 0.95) !important;
            pointer-events: auto !important; 
        }
    </style>
</head>
<body>

<div id="game-canvas">
    <div id="instruction-overlay" class="full-screen-overlay" style="display: flex;">
        <div class="instruction-card">
            <h2 style="color: var(--gold); margin-top: 0;">How to Play</h2>
            <p style="line-height: 1.6; font-size: 1rem;">
                Catch words in order to solve the proverb. <br>
                <b>Hint (3/level):</b> Lights up correct fish.<br>
                <b>Super Hint (2/level):</b> Shows sentence briefly.
            </p>
            <button style="background:var(--blue); color:white; padding:12px 35px; border:none; border-radius:50px; cursor:pointer; font-weight:bold; font-size: 1.1rem;" onclick="goToTopics()">START QUEST</button>
        </div>
    </div>

    <div id="level-select-overlay" class="full-screen-overlay">
        <h2 style="color: var(--gold); margin-bottom: 20px; font-size: 1.5rem;">Choose Your Quest Topic</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 90%; max-width: 400px;">
            <button class="level-btn" onclick="jumpToTier(1)">🕒 Time</button>
            <button class="level-btn" onclick="jumpToTier(2)">🧠 Mindset</button>
            <button class="level-btn" onclick="jumpToTier(3)">🏥 Health</button>
            <button class="level-btn" onclick="jumpToTier(4)">🎭 Character</button>
            <button class="level-btn" onclick="jumpToTier(5)">🏆 Success</button>
            <button class="level-btn" onclick="jumpToTier(6)">🌟 Misc</button>
        </div>
        <button id="menu-back-btn" style="margin-top: 30px; background: none; border: 1px solid white; color: white; padding: 10px 30px; border-radius: 30px; cursor: pointer; display: none;" onclick="closeLevelSelect()">BACK TO GAME</button>
    </div>

    <div id="level-badge">Level: 1</div>
    
    <div class="top-controls">
        <div id="hint-btn" class="action-btn" onclick="showHint(event)">HINT (3)</div>
        <div id="super-hint-btn" class="action-btn" onclick="useSuperHint(event)">SUPER<br>HINT (2)</div>
        <div id="select-menu-btn" class="action-btn" onclick="openLevelSelect(event)">TOPICS</div>
    </div>
    
    <div id="player">
        <div id="rod-line"></div>
        <img src="pandaa.png"> 
    </div>
    
    <div id="pond"></div>

    <div id="word-bar-container">
        <div id="word-display">Ready?</div>
    </div>

    <div id="level-title-screen" class="full-screen-overlay">
        <h1 id="main-level-name" style="font-size: 2.5rem; color: var(--gold);">LEVEL 1</h1>
        <p id="sub-level-title" style="font-size: 1.2rem;"></p>
    </div>

    <div id="victory-overlay" class="full-screen-overlay">
        <div style="background: white; padding: 25px; border-radius: 25px; border: 8px solid var(--gold); text-align: center; width: 85%; max-width: 350px;">
            <h1 style="color:var(--orange); margin-top:0; font-size: 1.5rem;">Level Clear!</h1>
            <div id="victory-text" style="font-size: 16px; margin: 15px 0; font-weight: bold; color: #333;"></div>
            <button style="background:var(--green); color:white; padding:12px 25px; border:none; border-radius:50px; cursor:pointer; font-weight:bold;" onclick="nextLevel()">CONTINUE</button>
        </div>
    </div>

    <div id="congrats-overlay" class="full-screen-overlay">
        <h1 style="color: var(--gold); margin: 0; font-size: 1.8rem;">🎉 CONGRATULATIONS! 🎉</h1>
        <p style="font-size: 1.2rem; color: white; margin: 15px 0;">Master of Proverbs</p>
        <button id="final-restart-btn" style="background:var(--orange); color:white; padding:15px 30px; border:none; border-radius:50px; cursor:pointer; font-weight:bold; font-size: 1rem;" onclick="restartGame()">PLAY AGAIN</button>
    </div>
</div>

<script>
    const tiers = {
        1: ["TIME IS MONEY", "ALL IN GOOD TIME", "BETTER LATE THAN NEVER", "OPPORTUNITY KNOCKS BUT ONCE", "A STITCH IN TIME SAVES NINE"],
        2: ["COUNT YOUR BLESSINGS", "HASTE MAKES WASTE", "BETTER TO BE SAFE THAN SORRY", "GREAT MINDS THINK ALIKE", "GOOD THINGS COME IN SMALL PACKAGES"],
        3: ["STILL WATERS RUN DEEP", "LAUGHTER IS THE BEST MEDICINE", "PREVENTION IS BETTER THAN CURE", "ALL THAT GLITTERS NOT GOLD", "WHERE THERE IS SMOKE THERE IS FIRE"],
        4: ["MANNERS MAKETH MAN", "CHARITY BEGINS AT HOME", "ACTIONS SPEAK LOUDER THAN WORDS", "DONT JUDGE A BOOK BY ITS COVER", "A FRIEND IN NEED IS A FRIEND INDEED"],
        5: ["NO PAIN NO GAIN", "PRACTICE MAKES PERFECT", "BIRDS OF A FEATHER FLOCK TOGETHER", "THE GRASS IS ALWAYS GREENER", "BEAUTY IS IN THE EYE OF THE BEHOLDER"],
        6: ["LOVE IS BLIND", "SMALL IS BEAUTIFUL", "SEEING IS BELIEVING", "FIRST COME FIRST SERVED", "FOOLS RUSH IN WHERE ANGELS FEAR TO TREAD"]
    };

    const levelTitles = { 1: "TIME & OPPORTUNITY", 2: "MINDSET & POSITIVITY", 3: "HEALTH & LIFE", 4: "CHARACTER", 5: "SUCCESS", 6: "MISCELLANEOUS" };

    let solvedTotal = 0;
    let superHintCount = 2;
    let hintCount = 3;
    let game = { proverbWords: [], step: 0, isFishing: false, showingSuper: false };
    let firstStart = true;

    function goToTopics() {
        document.getElementById('instruction-overlay').style.display = 'none';
        document.getElementById('level-select-overlay').style.display = 'flex';
    }

    function jumpToTier(tierNumber) {
        solvedTotal = (tierNumber - 1) * 5;
        closeLevelSelect();
        firstStart = false; 
        initLevel();
    }

    function openLevelSelect(e) {
        if(e) e.stopPropagation();
        document.getElementById('level-select-overlay').style.display = 'flex';
        if(!firstStart) document.getElementById('menu-back-btn').style.display = 'block';
    }

    function closeLevelSelect() {
        document.getElementById('level-select-overlay').style.display = 'none';
    }

    function initLevel() {
        if (firstStart) return; 
        document.getElementById('pond').innerHTML = "";
        document.getElementById('victory-overlay').style.display = 'none';
        document.getElementById('congrats-overlay').style.display = 'none';
        game.step = 0;
        superHintCount = 2;
        hintCount = 3;
        updateSuperBtnUI();
        updateHintBtnUI();
        let tierNum = Math.floor(solvedTotal / 5) + 1;
        let subIdx = solvedTotal % 5;
        if (subIdx === 0) {
            const screen = document.getElementById('level-title-screen');
            document.getElementById('main-level-name').innerText = `LEVEL ${tierNum}`;
            document.getElementById('sub-level-title').innerText = levelTitles[tierNum];
            screen.style.display = 'flex';
            setTimeout(() => { screen.style.display = 'none'; startFish(tierNum, subIdx); }, 2000);
        } else {
            startFish(tierNum, subIdx);
        }
    }

    function startFish(tier, idx) {
        document.getElementById('level-badge').innerText = `Level: ${tier}-${idx + 1}`;
        game.proverbWords = tiers[tier][idx].split(" ");
        const shuffled = [...game.proverbWords].sort(() => Math.random() - 0.5);
        shuffled.forEach((word, i) => {
            const f = document.createElement('div');
            f.className = 'fish-bubble';
            f.innerText = word;
            f.style.top = (30 + (i * (50/shuffled.length))) + '%';
            f.style.left = (Math.random() * 70 + 10) + '%';
            animateFish(f);
            document.getElementById('pond').appendChild(f);
        });
        updateUI();
    }

    function animateFish(el) {
        let x = parseFloat(el.style.left);
        let speed = 0.05 + (Math.random() * 0.05);
        setInterval(() => {
            if (!el.parentElement) return;
            x += speed; if (x > 105) x = -15;
            el.style.left = x + '%';
        }, 20);
    }

    function checkHit(x, y) {
        const target = game.proverbWords[game.step];
        document.querySelectorAll('.fish-bubble').forEach(f => {
            const r = f.getBoundingClientRect();
            const cR = document.getElementById('game-canvas').getBoundingClientRect();
            if (x > (r.left - cR.left) && x < (r.right - cR.left) && y > (r.top - cR.top) && y < (r.bottom - cR.top)) {
                if (f.innerText === target) {
                    f.remove(); 
                    game.step++; 
                    updateUI();
                    if(game.step === game.proverbWords.length) finishSubLevel();
                } else {
                    f.classList.add('wrong-fish');
                    setTimeout(() => f.classList.remove('wrong-fish'), 400);
                }
            }
        });
    }

    function showHint(e) {
        e.stopPropagation();
        const btn = document.getElementById('hint-btn');
        if(hintCount <= 0 || btn.style.pointerEvents === "none") return;
        hintCount--;
        updateHintBtnUI();
        const target = game.proverbWords[game.step];
        btn.style.pointerEvents = "none";
        document.querySelectorAll('.fish-bubble').forEach(f => {
            if(f.innerText === target) {
                f.classList.add('hint-glow');
                setTimeout(() => { f.classList.remove('hint-glow'); if(hintCount > 0) btn.style.pointerEvents = "auto"; }, 2000);
            }
        });
    }

    function updateHintBtnUI() {
        const btn = document.getElementById('hint-btn');
        btn.innerText = `HINT (${hintCount})`;
        btn.style.opacity = (hintCount <= 0) ? "0.3" : "1";
        btn.style.pointerEvents = (hintCount <= 0) ? "none" : "auto";
    }

    function useSuperHint(e) {
        e.stopPropagation();
        if (superHintCount <= 0 || game.showingSuper) return;
        superHintCount--; game.showingSuper = true; updateSuperBtnUI();
        const fullText = game.proverbWords.join(" ");
        document.getElementById('word-display').innerText = fullText;
        document.getElementById('word-display').style.color = "var(--blue)";
        setTimeout(() => {
            game.showingSuper = false;
            document.getElementById('word-display').style.color = "#333";
            updateUI();
        }, 3000);
    }

    function updateSuperBtnUI() {
        const btn = document.getElementById('super-hint-btn');
        btn.innerHTML = `SUPER<br>HINT (${superHintCount})`;
        btn.style.opacity = (superHintCount <= 0) ? "0.3" : "1";
    }

    const handleInput = (clientX, clientY, target) => {
        if (document.getElementById('instruction-overlay').style.display !== 'none' || 
            document.getElementById('level-select-overlay').style.display !== 'none' ||
            document.getElementById('congrats-overlay').style.display === 'flex' ||
            document.getElementById('victory-overlay').style.display === 'flex' ||
            game.isFishing || target.closest('.top-controls') || 
            target.closest('.level-btn') || target.closest('#final-restart-btn')) return;
        
        game.isFishing = true;
        const canvas = document.getElementById('game-canvas');
        const rect = canvas.getBoundingClientRect();
        const relX = clientX - rect.left;
        const relY = clientY - rect.top;
        const player = document.getElementById('player');
        const line = document.getElementById('rod-line');
        
        player.style.left = (relX - (player.offsetWidth * 0.8)) + 'px';
        
        setTimeout(() => {
            line.style.height = (relY - (player.offsetTop + (player.offsetHeight * 0.3))) + 'px';
            setTimeout(() => {
                checkHit(relX, relY);
                line.style.height = '0px';
                setTimeout(() => game.isFishing = false, 400);
            }, 500);
        }, 600);
    };

    window.addEventListener('mousedown', (e) => handleInput(e.clientX, e.clientY, e.target));
    window.addEventListener('touchstart', (e) => {
        if (game.isFishing) e.preventDefault();
        handleInput(e.touches[0].clientX, e.touches[0].clientY, e.target);
    }, {passive: false});

    function updateUI() {
        if(game.showingSuper) return;
        let str = "";
        game.proverbWords.forEach((w, i) => str += (i < game.step) ? w + " " : "____ ");
        document.getElementById('word-display').innerText = str;
    }

    function finishSubLevel() {
        const fullText = game.proverbWords.join(" ");
        document.getElementById('victory-text').innerText = fullText;
        document.getElementById('victory-overlay').style.display = 'flex';
        window.speechSynthesis.speak(new SpeechSynthesisUtterance(fullText.toLowerCase()));
    }

    function nextLevel() {
        solvedTotal++;
        if (solvedTotal >= 30) {
            document.getElementById('victory-overlay').style.display = 'none';
            document.getElementById('congrats-overlay').style.display = 'flex';
        } else {
            initLevel();
        }
    }

    function restartGame() { 
        solvedTotal = 0; 
        document.getElementById('congrats-overlay').style.display = 'none';
        goToTopics(); 
    }

    initLevel();
</script>

</body>
</html>
